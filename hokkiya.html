<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北寄や HOKKIYA — Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yusei+Magic&family=Zen+Maru+Gothic:wght@400;500;700;900&family=Baloo+2:wght@400;600;700&family=Gaegu:wght@400;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
  :root{
    --enji:#8B1A1A;
    --enji-deep:#6e1414;
    --cream:#FBF1DC;
    --cream-dim:#F0E2C0;
    --koge:#3E2A1C;
    --koge-soft:#9b7a5e;
    --yellow:#F0B429;
    --nav-offset:96px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--koge);
    -webkit-font-smoothing:antialiased;
  }
  body.lang-ja{font-family:'Zen Maru Gothic',sans-serif;}
  body.lang-vi,body.lang-en,body.lang-ms{font-family:'Baloo 2',sans-serif;}
  body.lang-ko{font-family:'Gaegu',sans-serif;}
  body.lang-zh-Hant,body.lang-zh-Hans{font-family:'ZCOOL KuaiLe',sans-serif;}

  header.top{
    background:var(--enji);
    color:var(--cream);
    padding:20px 16px 26px;
    text-align:center;
    position:relative;
  }
  .hero-img{
    display:block;
    width:260px;
    max-width:80vw;
    margin:0 auto -4px;
  }
  .mascot-slot{
    display:none;
  }
  .mascot-slot img{width:100%;height:100%;object-fit:cover;}
  .mascot-slot input{display:none;}
  .brand-jp{
    font-family:'Yusei Magic',cursive;
    font-weight:400;
    font-size:28px;
    margin:2px 0 4px;
    letter-spacing:0.06em;
  }
  .brand-jp .lantern{font-size:18px;vertical-align:0;margin:0 4px;}
  .brand-en{
    font-size:11px;
    letter-spacing:0.3em;
    color:var(--yellow);
    margin:0 0 8px;
  }
  .tagline{
    font-size:13px;
    color:#f4e3c1;
    margin:0;
  }
  .header-edge{
    height:12px;
    background:
      linear-gradient(135deg, var(--enji) 25%, transparent 25.5%),
      linear-gradient(225deg, var(--enji) 25%, transparent 25.5%);
    background-size:14px 14px;
    background-position:0 0, 7px 0;
    background-color:var(--cream);
  }

  nav.lang-row, nav.page-row, nav.cat-row{
    position:sticky;
    z-index:30;
    display:flex;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  nav.lang-row::-webkit-scrollbar, nav.page-row::-webkit-scrollbar, nav.cat-row::-webkit-scrollbar{display:none;}
  nav.lang-row{
    top:0;
    background:var(--cream-dim);
    border-bottom:2px dashed var(--koge-soft);
    padding:7px 8px;
    gap:6px;
  }
  .lang-tab{
    flex:0 0 auto;
    font-size:12.5px;
    color:var(--koge);
    background:#fff;
    border:1.5px solid var(--koge-soft);
    border-radius:999px;
    padding:6px 13px;
    cursor:pointer;
    white-space:nowrap;
  }
  .lang-tab.active{
    background:var(--yellow);
    color:var(--koge);
    border-color:var(--yellow);
    font-weight:700;
  }
  nav.page-row{
    top:0;
    background:var(--enji);
    padding:8px 8px;
    gap:6px;
    border-bottom:2px solid var(--enji-deep);
  }
  .page-tab{
    flex:1 1 0;
    text-align:center;
    font-size:12.5px;
    font-weight:700;
    letter-spacing:0.02em;
    color:#f4e3c1;
    background:transparent;
    border:none;
    border-radius:10px;
    padding:9px 4px;
    cursor:pointer;
    white-space:nowrap;
  }
  .page-tab.active{
    background:var(--cream);
    color:var(--enji);
  }
  /* ===== お店紹介ページ ===== */
  .about-wrap{padding:16px 10px 30px;}
  .about-intro{
    font-size:14.5px;
    line-height:1.85;
    color:var(--koge);
    background:#fff;
    border-radius:14px;
    padding:16px 18px;
    margin:0 0 22px;
    box-shadow:0 2px 8px rgba(62,42,28,.07);
  }
  .about-features{
    display:flex;
    flex-direction:column;
    gap:14px;
    margin-bottom:24px;
  }
  .about-card{
    background:#fff;
    border-radius:16px;
    padding:16px 18px;
    box-shadow:0 2px 8px rgba(62,42,28,.07);
    border-left:4px solid var(--enji);
    display:flex;
    align-items:flex-start;
    gap:14px;
  }
  .about-card-img{
    font-size:36px;
    flex-shrink:0;
    line-height:1;
    margin-top:2px;
  }
  .about-card-title{
    font-size:15px;
    font-weight:700;
    color:var(--enji);
    margin:0 0 5px;
  }
  .about-card-sub{
    font-size:13px;
    line-height:1.65;
    color:var(--koge-soft);
    margin:0;
  }
  .about-nav-btns{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:30px;
  }
  .about-nav-btn{
    width:100%;
    padding:14px 18px;
    border:none;
    border-radius:12px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    text-align:left;
    transition:opacity .15s;
  }
  .about-nav-btn:active{opacity:.8;}
  .about-nav-btn--menu{
    background:var(--enji);
    color:#fff;
  }
  .about-nav-btn--sake{
    background:var(--yellow);
    color:var(--koge);
  }
  .review-block{text-align:center;padding:0 4px;}
  .review-cta-lead{
    font-size:13.5px;
    line-height:1.7;
    color:var(--koge);
    margin:0 0 16px;
    padding:12px 14px;
    background:var(--cream-dim);
    border-radius:12px;
    text-align:left;
  }

  .coming-soon{
    display:flex;
    justify-content:center;
    padding:36px 6px 10px;
  }
  .coming-soon-card{
    max-width:320px;
    width:100%;
    background:#fff;
    border:2px dashed var(--enji);
    border-radius:18px;
    padding:34px 22px;
    text-align:center;
  }
  .coming-soon-icon{
    font-size:42px;
    display:block;
    margin-bottom:10px;
  }
  .coming-soon-heading{
    font-size:18px;
    font-weight:700;
    color:var(--enji);
    margin:0 0 8px;
  }
  .coming-soon-badge{
    display:inline-block;
    background:var(--yellow);
    color:var(--koge);
    font-size:11px;
    font-weight:700;
    padding:4px 12px;
    border-radius:999px;
    margin:0 0 14px;
  }
  .coming-soon-body{
    font-size:13px;
    line-height:1.7;
    color:var(--koge-soft);
    margin:0;
  }
  nav.cat-row{
    top:0;
    background:var(--cream);
    border-bottom:2px dashed var(--koge-soft);
    padding:10px 10px 9px;
    gap:8px;
  }
  .cat-tab{
    flex:0 0 auto;
    font-size:13.5px;
    font-weight:700;
    color:var(--enji);
    background:#fff;
    border:2px solid var(--enji);
    border-radius:999px;
    padding:7px 14px;
    cursor:pointer;
    white-space:nowrap;
  }
  .cat-tab.active{
    background:var(--enji);
    border-color:var(--enji);
    color:var(--cream);
  }
  main{
    max-width:680px;
    margin:0 auto;
    padding:16px 14px 50px;
  }
  .cat-section{
    scroll-margin-top:var(--nav-offset, 96px);
  }
  .cat-section + .cat-section{
    margin-top:32px;
  }
  .section-title{
    font-weight:700;
    font-size:19px;
    color:var(--koge);
    margin:8px 0 12px;
    display:flex;
    align-items:center;
    gap:8px;
    padding-bottom:8px;
    border-bottom:3px dashed var(--yellow);
  }
  .mascot-mini{width:26px;height:26px;border-radius:50%;object-fit:cover;flex:0 0 auto;}
  .mascot-mini-fallback{font-size:20px;flex:0 0 auto;}
  .sub-title{
    font-size:13.5px;
    font-weight:700;
    color:var(--enji);
    margin:18px 2px 8px;
  }
  .item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 4px;
    border-bottom:2px dashed var(--cream-dim);
    background:#fff;
    border-radius:12px;
    margin-bottom:6px;
    padding:9px 8px;
  }
  .photo-slot{
    width:46px;height:46px;
    flex:0 0 auto;
    border-radius:10px;
    border:2px dashed var(--koge-soft);
    display:flex;align-items:center;justify-content:center;
    background:var(--cream);
    font-size:18px;
    cursor:pointer;
    overflow:hidden;
  }
  .photo-slot img{width:100%;height:100%;object-fit:cover;}
  .photo-slot input{display:none;}
  .item-main{flex:1;min-width:0;}
  .item-name{
    margin:0;
    font-size:15px;
    font-weight:700;
    color:var(--koge);
    line-height:1.4;
  }
  .num-badge{
    display:inline-flex;
    align-items:center;justify-content:center;
    width:20px;height:20px;
    border-radius:50%;
    background:var(--yellow);
    color:var(--koge);
    font-size:11px;
    font-weight:700;
    margin-right:6px;
  }
  .item-desc{
    margin:2px 0 0;
    font-size:11.5px;
    line-height:1.5;
    color:var(--koge-soft);
  }
  .item-price{
    flex:0 0 auto;
    text-align:right;
    font-weight:700;
    color:var(--enji);
    font-size:14px;
    white-space:nowrap;
    line-height:1.5;
  }
  .item-price .price-bottle{
    display:block;
    font-size:11px;
    font-weight:500;
    color:var(--koge-soft);
  }
  .price-row-label{
    font-weight:500;
    font-size:11px;
    color:var(--koge-soft);
  }
  .broth-card{
    background:var(--koge);
    color:var(--cream);
    border-radius:14px;
    padding:16px;
    margin-bottom:18px;
    border:2px dashed var(--yellow);
  }
  .broth-card h3{
    margin:0 0 8px;
    font-size:16px;
    color:var(--yellow);
  }
  .broth-card p{
    margin:0 0 10px;
    font-size:13px;
    line-height:1.65;
    color:#ecdfc4;
  }
  .set-card{
    background:#fff;
    border:2px dashed var(--enji);
    border-radius:14px;
    padding:12px 14px;
    margin-top:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .set-label{
    font-size:11px;
    color:var(--enji);
    font-weight:700;
    margin:0 0 2px;
  }
  .stars{
    text-align:center;
    font-size:26px;
    letter-spacing:5px;
    color:var(--yellow);
    margin:0 0 14px;
  }
  .review-intro{
    font-size:14.5px;
    line-height:1.75;
    color:var(--koge);
    margin:0 0 18px;
    text-align:center;
  }
  .tag-row{
    display:flex;
    gap:8px;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:24px;
  }
  .tag{
    background:#fff;
    border:2px dashed var(--cream-dim);
    border-radius:14px;
    padding:8px 12px;
    font-size:12px;
    font-weight:700;
    color:var(--koge-soft);
    text-align:center;
    flex:1 1 100px;
  }
  .tag .tag-icon{
    display:block;
    font-size:20px;
    margin-bottom:2px;
  }
  .cta-button{
    display:block;
    max-width:320px;
    margin:0 auto 12px;
    background:var(--enji);
    color:var(--cream);
    text-align:center;
    padding:16px 18px;
    border-radius:999px;
    font-weight:700;
    font-size:16.5px;
    text-decoration:none;
    box-shadow:0 6px 0 var(--enji-deep);
    transition:transform 0.05s ease;
  }
  .cta-button:active{
    transform:translateY(4px);
    box-shadow:0 2px 0 var(--enji-deep);
  }
  .cta-sub{
    text-align:center;
    font-size:12.5px;
    color:var(--koge-soft);
    margin:0 0 22px;
  }
  .thanks-card{
    background:#fff;
    border-radius:16px;
    padding:18px;
    text-align:center;
  }
  .thanks-card .thanks-icon{
    font-size:26px;
    display:block;
    margin-bottom:6px;
  }
  .thanks-card p{
    margin:0;
    font-size:14px;
    color:var(--koge);
  }
  footer{
    text-align:center;
    padding:24px 16px 40px;
    color:var(--koge-soft);
    font-size:12px;
    line-height:1.7;
  }
  footer .addr-line{margin:2px 0;}
</style>
</head>

    {num:17,names:N('名物ジンギスカン','Thịt cừu xào Ghengiskhan','Genghis Khan Grilled Lamb (Specialty)','명물 징기스칸','招牌成吉思汗烤羊肉','招牌成吉思汗烤羊肉','Daging Kambing Bakar Genghis Khan (Istimewa)'),desc:N('もやしの上に味付きラム肉をのせて焼く、お肉の旨味がもやしに染み込む北海道のソウルフード。','Thịt cừu đã ướp gia vị được nướng trên giá đỗ, để vị ngon của thịt thấm vào giá đỗ — món ăn linh hồn của Hokkaido.','Seasoned lamb grilled atop a bed of bean sprouts, letting the meat\'s flavor soak into the sprouts — a Hokkaido soul food.','콩나물 위에 양념한 양고기를 올려 굽는, 고기의 깊은 맛이 콩나물에 스며드는 홋카이도의 소울푸드입니다.','在豆芽菜上鋪滿調味羊肉一起燒烤，肉的鮮美完全滲入豆芽菜，是北海道的靈魂美食。','在豆芽菜上铺满调味羊肉一起烧烤，肉的鲜美完全渗入豆芽菜，是北海道的灵魂美食。','Daging kambing berperisa dibakar di atas kacang hijau, membiarkan rasa daging meresap ke dalam kacang hijau — makanan jiwa Hokkaido.'),price:198000,photo:'17.png'},
    {num:18,names:N('羅臼の真ほっけ炭火焼き','Cá Hokke 1 nắng','Rausu Hokke Mackerel, Charcoal-Grilled','라우스 홋케 숯불구이','羅臼花魚炭火燒','罗臼花鱼炭火烤','Ikan Hokke Rausu Bakar Arang'),desc:N('脂が乗った肉厚のほっけを、炭火でふっくらジューシーに焼き上げた自慢の1枚。','Cá Hokke dày thịt và béo ngậy, được nướng trên lửa than cho đến khi mềm mọng nước — món cá tự hào của quán.','Thick, fatty hokke mackerel, grilled over charcoal until plump and juicy — our proud signature piece.','기름이 가득한 두툼한 홋케를, 숯불로 통통하고 육즙 가득하게 구워낸 자신 있는 한 마리입니다.','油脂豐厚的厚切花魚，以炭火烤得鬆軟多汁，是本店自豪的招牌一片。','油脂丰厚的厚切花鱼，以炭火烤得松软多汁，是本店自豪的招牌一片。','Ikan hokke yang tebal dan berlemak, dibakar di atas arang hingga gebu dan berair — kepingan istimewa kebanggaan kami.'),price:218000,photo:'18.png'},
    {num:19,names:N('帯広名物！豚丼','Cơm thịt heo áp chảo','Obihiro Specialty! Pork Rice Bowl','오비히로 명물! 돈부리','帶廣名物！豬肉蓋飯','带广名物！猪肉盖饭','Istimewa Obihiro! Nasi Daging Khinzir'),desc:N('柔らかい豚肉に甘辛い濃厚タレを絡めて、お茶碗のご飯が見えなくなるくらい贅沢に乗せました。','Thịt heo mềm được áo trong nước sốt đậm đà ngọt mặn, phủ đầy lên đến mức không còn nhìn thấy cơm bên dưới.','Tender pork glazed in a rich, sweet-savory sauce, piled on generously until the rice underneath disappears from sight.','부드러운 돼지고기에 깊은 맛의 매콤달콤한 소스를 듬뿍 발라, 밥이 안 보일 정도로 푸짐하게 올렸습니다.','軟嫩豬肉裹上濃郁甜辣醬汁，豪邁地鋪滿到看不見底下的米飯。','软嫩猪肉裹上浓郁甜辣酱汁，豪迈地铺满到看不见底下的米饭。','Daging khinzir lembut disaluti sos pekat manis pedas, ditambah dengan banyaknya sehingga nasi di bawah tidak kelihatan.'),price:148000,photo:'19.png'},
    {num:20,names:N('札幌チキンスープカレー','Sapporo soup curry đùi gà','Sapporo Chicken Soup Curry','삿포로 치킨 스프카레','札幌雞肉湯咖哩','札幌鸡肉汤咖喱','Kari Sup Ayam Gaya Sapporo'),desc:N('スパイス香るサラサラのスープに、ホロホロのチキンとゴロゴロの大きな野菜が入った札幌名物。','Đặc sản Sapporo với nước súp thơm gia vị, thanh nhẹ, có gà mềm tan và những miếng rau củ to.','A Sapporo specialty featuring a light, spice-fragrant soup with fall-apart tender chicken and big chunks of vegetables.','향긋한 스파이스가 살아있는 산뜻한 수프에, 부드럽게 부서지는 치킨과 큼직한 채소가 듬뿍 들어간 삿포로 명물입니다.','香料芬芳的清爽湯底，搭配軟嫩入味的雞肉與大塊蔬菜，是札幌的代表美食。','香料芬芳的清爽汤底，搭配软嫩入味的鸡肉与大块蔬菜，是札幌的代表美食。','Sup nipis berperisa rempah dengan ayam yang lembut mudah lerai dan ketulan sayur besar — istimewa dari Sapporo.'),price:218000,photo:'20.png'},
    {num:21,names:N('根室！エスカロップ','Cơm bò tỏi heo chiên xù','Nemuro Specialty! Escalope Rice','네무로 명물! 에스카롭','根室名物！炸豬排飯','根室名物！炸猪排饭','Istimewa Nemuro! Nasi Escalope'),desc:N('バターライスの上にサクサクの豚カツをのせて、特製デミグラスソースをかけた根室のローカル洋食。','Cốt lết heo giòn rụm trên cơm bơ, rưới sốt demi-glace đặc biệt — món Tây kiểu địa phương Nemuro.','Crispy pork cutlet served over butter rice, topped with our special demi-glace sauce — a Nemuro local Western-style dish.','버터라이스 위에 바삭한 돈카츠를 올리고, 특제 데미글라스 소스를 뿌린 네무로 지역의 양식 요리입니다.','奶油飯上鋪滿酥脆豬排，淋上特製多蜜醬汁，是根室當地的洋食料理。','奶油饭上铺满酥脆猪排，淋上特制多蜜酱汁，是根室当地的洋食料理。','Cutlet khinzir rangup di atas nasi mentega, disiram sos demi-glace istimewa — hidangan gaya Barat tempatan Nemuro.'),price:178000,photo:'21.png'},
    {num:22,names:N('レギュラーバーグディッシュ','Cơm dĩa bò Hamburg','Hamburg Steak Rice Plate','함박스테이크 라이스 플레이트','漢堡排定食','汉堡排套餐','Pinggan Nasi Hamburg Steak'),desc:N('ジューシーなハンバーグ、ご飯、サラダがワンプレートになった、日本のどこか懐かしいお馴染みのスタイル。','Hamburg steak mọng nước, cơm và salad trên cùng một đĩa — phong cách quen thuộc, gợi nhớ của Nhật Bản.','Juicy hamburg steak, rice, and salad together on one plate — a familiar, nostalgic Japanese classic.','육즙 가득한 함박스테이크와 밥, 샐러드가 한 플레이트에 담긴, 일본의 어딘가 그리운 익숙한 스타일입니다.','多汁的漢堡排、米飯與沙拉同盤呈現，是日本令人懷念又熟悉的經典風格。','多汁的汉堡排、米饭与沙拉同盘呈现，是日本令人怀念又熟悉的经典风格。','Hamburg steak yang berair, nasi, dan salad dalam satu pinggan — gaya klasik Jepun yang membawa nostalgia.'),price:198000,photo:'22.png'},
    {num:23,names:N('北海道味噌ラーメン','Mì Ramen Miso Hokkaido','Hokkaido Miso Ramen','홋카이도 미소 라멘','北海道味噌拉麵','北海道味噌拉面','Ramen Miso Hokkaido'),desc:N('コク深い濃厚な味噌スープに、黄色いちぢれ麺がしっかり絡む札幌生まれの大人気ラーメン。','Súp miso đậm đà sâu lắng, hòa quyện hoàn hảo với sợi mì vàng xoăn — món ramen cực kỳ nổi tiếng có nguồn gốc từ Sapporo.','Rich, deeply flavorful miso soup clinging perfectly to curly yellow noodles — a hugely popular ramen born in Sapporo.','깊은 맛의 진한 미소 수프에 노란 꼬불꼬불한 면이 착 감기는, 삿포로에서 탄생한 인기 만점 라멘입니다.','濃郁深厚的味噌湯頭，緊緊裹附在黃色捲麵上，是發源於札幌的超人氣拉麵。','浓郁深厚的味噌汤头，紧紧裹附在黄色卷面上，是发源于札幌的超人气拉面。','Sup miso yang pekat dan kaya rasa, melekat sempurna pada mi kuning berkerinting — ramen popular yang berasal dari Sapporo.'),price:148000,photo:'23.png'},

const PAGES = ['menu','about','sake','information'];
const CATS = ['oden','starters','fried','grilled','drinks'];
let currentLang = 'ja';
let currentPage = 'menu';
let currentCat = 'oden';
let mascotDataUrl = null;
let uidCounter = 0;
const itemsByUid = {};

function buildIndex(){
  ['starters','fried','grilled'].forEach(k=>{
    DATA[k].forEach(it=>{ it.uid = uidCounter++; itemsByUid[it.uid]=it; });
  });
  DATA.oden.items.forEach(it=>{ it.uid = uidCounter++; itemsByUid[it.uid]=it; });
  DATA.oden.set.uid = uidCounter++; itemsByUid[DATA.oden.set.uid]=DATA.oden.set;
  Object.keys(DATA.drinks).forEach(k=>{
    DATA.drinks[k].forEach(it=>{ it.uid = uidCounter++; itemsByUid[it.uid]=it; });
  });
}
buildIndex();

function fmt(n){ return n.toLocaleString('en-US') + '₫'; }

function photoSlotHtml(item){
  const img = item.photo ? `<img src="${item.photo}">` : '📷';
  return `<label class="photo-slot"><span class="photo-fallback">${item.photo?'':img}</span>${item.photo?img:''}<input type="file" accept="image/*" class="photo-input" data-uid="${item.uid}"></label>`;
}

function itemRow(item, lang, showPhoto){
  if(showPhoto === undefined) showPhoto = true;
  const name = item.names[lang] || item.names.en;
  const desc = item.desc ? `<p class="item-desc">${item.desc[lang] || item.desc.ja}</p>` : '';
  const numBadge = item.num ? `<span class="num-badge">${item.num}</span>` : '';
  let priceHtml;
  if(item.priceBottle){
    priceHtml = `<span class="price-row-label">${UI[lang].glass}</span> ${fmt(item.price)}<span class="price-bottle">${UI[lang].bottle} ${fmt(item.priceBottle)}</span>`;
  } else {
    priceHtml = fmt(item.price);
  }
  const photo = showPhoto ? photoSlotHtml(item) : '';
  return `<div class="item">${photo}<div class="item-main"><p class="item-name">${numBadge}${name}</p>${desc}</div><div class="item-price">${priceHtml}</div></div>`;
}

function renderSimpleList(items, lang, showPhoto){
  return items.map(it => itemRow(it, lang, showPhoto)).join('');
}

function mascotMiniHtml(){
  return mascotDataUrl ? `<img class="mascot-mini" src="${mascotDataUrl}">` : `<span class="mascot-mini-fallback">🐻</span>`;
}

function renderOden(lang){
  const u = UI[lang];
  const broth = `
    <div class="broth-card">
      <h3>${u.brothTitle}</h3>
      <p style="margin-bottom:0;">${u.brothBody}</p>
    </div>`;
  const list = renderSimpleList(DATA.oden.items, lang);
  const setItem = DATA.oden.set;
  const setName = setItem.names[lang] || setItem.names.en;
  const setPhoto = setItem.photo ? `<img src="${setItem.photo}">` : '🍱';
  const setCard = `
    <div class="set-card">
      <label class="photo-slot">${setItem.photo?'':setPhoto}${setItem.photo?setPhoto:''}<input type="file" accept="image/*" class="photo-input" data-uid="${setItem.uid}"></label>
      <div style="flex:1;margin:0 10px;">
        <p class="set-label">${u.setLabel}</p>
        <p class="item-name" style="margin:0;">${setName}</p>
      </div>
      <div class="item-price">${fmt(setItem.price)}</div>
    </div>`;
  return broth + list + setCard;
}

function renderDrinks(lang){
  const u = UI[lang];
  const order = [['beer','sub_beer'],['whisky','sub_whisky'],['sour','sub_sour'],['teaCocktail','sub_teaCocktail'],['shochu','sub_shochu'],['sake','sub_sake'],['softDrink','sub_softDrink']];
  return order.map(([key,labelKey]) => {
    return `<p class="sub-title">${u[labelKey]}</p>` + renderSimpleList(DATA.drinks[key], lang, false);
  }).join('');
}

    <p class="review-intro">${u.reviewIntro}</p>

      <div class="tag"><span class="tag-icon">🍢</span>${u.reviewTag2}</div>

function renderCategoryBody(cat, lang){
  if(cat==='oden') return renderOden(lang);
  if(cat==='drinks') return renderDrinks(lang);
  return renderSimpleList(DATA[cat], lang);
}

function renderComingSoon(lang, page){
  const u = UI[lang];
  const icon = page === 'sake' ? '🍶' : '📣';
  const title = page === 'sake' ? u.page_sake : u.page_information;
  const body = page === 'sake' ? u.comingSoonSake : u.comingSoonInfo;
  return `
    <section class="cat-section coming-soon">
      <div class="coming-soon-card">
        <span class="coming-soon-icon">${icon}</span>
        <h2 class="coming-soon-heading">${title}</h2>
        <p class="coming-soon-badge">${u.comingSoonTitle}</p>
        <p class="coming-soon-body">${body}</p>
      </div>
    </section>`;
}

let scrollObserver = null;

function syncNavLayout(){
  const langRow = document.getElementById('langRow');
  const pageRow = document.getElementById('pageRow');
  const catRow = document.getElementById('catRow');
  const langH = langRow.offsetHeight;
  pageRow.style.top = langH + 'px';
  const pageH = pageRow.offsetHeight;
  if(currentPage === 'menu'){
    catRow.style.top = (langH + pageH) + 'px';
    const catH = catRow.offsetHeight;
    document.documentElement.style.setProperty('--nav-offset', (langH + pageH + catH + 10) + 'px');
  } else {
    document.documentElement.style.setProperty('--nav-offset', (langH + pageH + 10) + 'px');
  }
}

function setActivePageTab(page){
  document.querySelectorAll('.page-tab').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.page === page);
  });
}

function scrollToPage(page){
  currentPage = page;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function setActiveCatTab(cat){
  document.querySelectorAll('.cat-tab').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.cat === cat);
  });
}

function scrollToCat(cat){
  currentCat = cat;
  setActiveCatTab(cat);
  const el = document.getElementById('cat-' + cat);
  if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

function setupScrollSpy(){
  if(scrollObserver) scrollObserver.disconnect();
  const navOffset = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--nav-offset')) || 100;
  scrollObserver = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        currentCat = entry.target.id.replace('cat-','');
        setActiveCatTab(currentCat);
      }
    });
  }, { rootMargin: `-${navOffset}px 0px -70% 0px`, threshold: 0 });
  document.querySelectorAll('.cat-section').forEach(sec => scrollObserver.observe(sec));
}

function render(){
  const u = UI[currentLang];
  document.documentElement.lang = currentLang;
  document.body.className = 'lang-' + currentLang;
  document.getElementById('tagline').textContent = u.tagline;
  document.getElementById('footAddrLabel').textContent = u.address;
  document.getElementById('footHotlineLabel').textContent = u.hotline;
  document.getElementById('footNote').textContent = u.footerNote;

  const langRow = document.getElementById('langRow');
  langRow.innerHTML = LANGS.map(l => `<button class="lang-tab${l.code===currentLang?' active':''}" data-lang="${l.code}">${l.label}</button>`).join('');
  langRow.querySelectorAll('.lang-tab').forEach(btn => {
    btn.addEventListener('click', () => { currentLang = btn.dataset.lang; render(); });
  });

  const pageRow = document.getElementById('pageRow');
  pageRow.innerHTML = PAGES.map(p => `<button class="page-tab${p===currentPage?' active':''}" data-page="${p}">${u['page_'+p]}</button>`).join('');
  pageRow.querySelectorAll('.page-tab').forEach(btn => {
    btn.addEventListener('click', () => { scrollToPage(btn.dataset.page); });
  });

  const catRow = document.getElementById('catRow');
  const main = document.getElementById('main');

  if(currentPage === 'menu'){
    catRow.style.display = 'flex';
    catRow.innerHTML = CATS.map(c => `<button class="cat-tab${c===currentCat?' active':''}" data-cat="${c}">${u['cat_'+c]}</button>`).join('');
    catRow.querySelectorAll('.cat-tab').forEach(btn => {
      btn.addEventListener('click', () => { scrollToCat(btn.dataset.cat); });
    });

    main.innerHTML = CATS.map(c => `<section class="cat-section" id="cat-${c}"><h2 class="section-title">${mascotMiniHtml()}${u['cat_'+c]}</h2>${renderCategoryBody(c, currentLang)}</section>`).join('');

    main.querySelectorAll('.photo-input').forEach(input=>{
      input.addEventListener('change', e=>{
        const file = e.target.files[0];
        if(!file) return;
        const uid = parseInt(e.target.dataset.uid,10);
        const reader = new FileReader();
        reader.onload = ()=>{
          itemsByUid[uid].photo = reader.result;
          render();
        };
        reader.readAsDataURL(file);
      });
    });

    syncNavLayout();
    setupScrollSpy();
  } else {
    catRow.style.display = 'none';
    catRow.innerHTML = '';
    if(scrollObserver){ scrollObserver.disconnect(); scrollObserver = null; }

    if(currentPage === 'about'){
      main.innerHTML = renderAboutPage(currentLang);
    } else {
      main.innerHTML = renderComingSoon(currentLang, currentPage);
    }

    syncNavLayout();
  }
}

document.getElementById('mascotInput').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    mascotDataUrl = reader.result;
    document.getElementById('mascotFallback').outerHTML = `<img src="${mascotDataUrl}">`;
    render();
  };
  reader.readAsDataURL(file);
});

window.addEventListener('resize', syncNavLayout);
if(document.fonts && document.fonts.ready){
  document.fonts.ready.then(syncNavLayout);
}

render();
</script>
