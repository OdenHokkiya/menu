<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北寄や HOKKIYA — Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    --enji:#8B1A1A;
    --enji-deep:#6e1414;
    --cream:#FBF1DC;
    --cream-dim:#F0E2C0;
    --koge:#3E2A1C;
    --koge-soft:#9b7a5e;
    --yellow:#F0B429;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--koge);
    -webkit-font-smoothing:antialiased;
  }
  body.lang-ja{font-family:'Zen Maru Gothic',sans-serif;}
  body.lang-vi,body.lang-en,body.lang-ms{font-family:'Baloo 2',sans-serif;}
  body.lang-ko{font-family:'Gaegu',sans-serif;}
  body.lang-zh-Hant,body.lang-zh-Hans{font-family:'ZCOOL KuaiLe',sans-serif;}

  header.top{
    background:var(--enji);
    color:var(--cream);
    padding:20px 16px 26px;
    text-align:center;
    position:relative;
  }
  .mascot-slot{
    width:84px;height:84px;
    border-radius:50%;
    background:var(--cream);
    border:3px dashed var(--yellow);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 8px;
    cursor:pointer;
    font-size:36px;
    overflow:hidden;
  }
  .mascot-slot img{width:100%;height:100%;object-fit:cover;}
  .mascot-slot input{display:none;}
  .brand-jp{
    font-family:'Yusei Magic',cursive;
    font-weight:400;
    font-size:28px;
    margin:2px 0 4px;
    letter-spacing:0.06em;
  }
  .brand-jp .lantern{font-size:18px;vertical-align:0;margin:0 4px;}
  .brand-en{
    font-size:11px;
    letter-spacing:0.3em;
    color:var(--yellow);
    margin:0 0 8px;
  }
  .tagline{
    font-size:13px;
    color:#f4e3c1;
    margin:0;
  }
  .header-edge{
    height:12px;
    background:
      linear-gradient(135deg, var(--enji) 25%, transparent 25.5%),
      linear-gradient(225deg, var(--enji) 25%, transparent 25.5%);
    background-size:14px 14px;
    background-position:0 0, 7px 0;
    background-color:var(--cream);
  }

  nav.lang-row, nav.cat-row{
    position:sticky;
    z-index:30;
    display:flex;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  nav.lang-row::-webkit-scrollbar, nav.cat-row::-webkit-scrollbar{display:none;}
  nav.lang-row{
    top:0;
    background:var(--cream-dim);
    border-bottom:2px dashed var(--koge-soft);
    padding:7px 8px;
    gap:6px;
  }
  .lang-tab{
    flex:0 0 auto;
    font-size:12.5px;
    color:var(--koge);
    background:#fff;
    border:1.5px solid var(--koge-soft);
    border-radius:999px;
    padding:6px 13px;
    cursor:pointer;
    white-space:nowrap;
  }
  .lang-tab.active{
    background:var(--yellow);
    color:var(--koge);
    border-color:var(--yellow);
    font-weight:700;
  }
  nav.cat-row{
    top:0;
    background:var(--cream);
    border-bottom:2px dashed var(--koge-soft);
    padding:10px 10px 9px;
    gap:8px;
  }
  .cat-tab{
    flex:0 0 auto;
    font-size:13.5px;
    font-weight:700;
    color:var(--enji);
    background:#fff;
    border:2px solid var(--enji);
    border-radius:999px;
    padding:7px 14px;
    cursor:pointer;
    white-space:nowrap;
  }
  .cat-tab.active{
    background:var(--enji);
    border-color:var(--enji);
    color:var(--cream);
  }
  main{
    max-width:680px;
    margin:0 auto;
    padding:16px 14px 50px;
  }
  .section-title{
    font-weight:700;
    font-size:19px;
    color:var(--koge);
    margin:8px 0 12px;
    display:flex;
    align-items:center;
    gap:8px;
    padding-bottom:8px;
    border-bottom:3px dashed var(--yellow);
  }
  .mascot-mini{width:26px;height:26px;border-radius:50%;object-fit:cover;flex:0 0 auto;}
  .mascot-mini-fallback{font-size:20px;flex:0 0 auto;}
  .sub-title{
    font-size:13.5px;
    font-weight:700;
    color:var(--enji);
    margin:18px 2px 8px;
  }
  .item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 4px;
    border-bottom:2px dashed var(--cream-dim);
    background:#fff;
    border-radius:12px;
    margin-bottom:6px;
    padding:9px 8px;
  }

    width:46px;height:46px;
    flex:0 0 auto;
    border-radius:10px;
    border:2px dashed var(--koge-soft);
    display:flex;align-items:center;justify-content:center;
    background:var(--cream);
    font-size:18px;
    cursor:pointer;
    overflow:hidden;
  }
  .photo-slot img{width:100%;height:100%;object-fit:cover;}
  .photo-slot input{display:none;}
  .item-main{flex:1;min-width:0;}
  .item-name{
    margin:0;
    font-size:15px;
    font-weight:700;
    color:var(--koge);
    line-height:1.4;
  }
  .num-badge{
    display:inline-flex;
    align-items:center;justify-content:center;
    width:20px;height:20px;
    border-radius:50%;
    background:var(--yellow);
    color:var(--koge);
    font-size:11px;
    font-weight:700;
    margin-right:6px;
  }
  .item-jp{
    margin:2px 0 0;
    font-size:11.5px;
    color:var(--koge-soft);
  }
  .item-price{
    flex:0 0 auto;
    text-align:right;
    font-weight:700;
    color:var(--enji);
    font-size:14px;
    white-space:nowrap;
    line-height:1.5;
  }
  .item-price .price-bottle{
    display:block;
    font-size:11px;
    font-weight:500;
    color:var(--koge-soft);
  }
  .price-row-label{
    font-weight:500;
    font-size:11px;
    color:var(--koge-soft);
  }
  .broth-card{
    background:var(--koge);
    color:var(--cream);
    border-radius:14px;
    padding:16px;
    margin-bottom:18px;
    border:2px dashed var(--yellow);
  }
  .broth-card h3{
    margin:0 0 8px;
    font-size:16px;
    color:var(--yellow);
  }
  .broth-card p{
    margin:0 0 10px;
    font-size:13px;
    line-height:1.65;
    color:#ecdfc4;
  }
  .today-badge{
    display:inline-block;
    background:var(--yellow);
    color:var(--koge);
    font-size:11px;
    font-weight:700;
    padding:3px 10px;
    border-radius:999px;
    margin-bottom:6px;
  }
  .today-name{
    font-weight:700;
    font-size:15px;
    color:#fff;
    margin:0 0 4px;
  }
  .set-card{
    background:#fff;
    border:2px dashed var(--enji);
    border-radius:14px;
    padding:12px 14px;
    margin-top:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .set-label{
    font-size:11px;
    color:var(--enji);
    font-weight:700;
    margin:0 0 2px;
  }
  footer{
    text-align:center;
    padding:24px 16px 40px;
    color:var(--koge-soft);
    font-size:12px;
    line-height:1.7;
  }

const CATS = ['starters','fried','grilled','riceNoodle','oden','drinks'];
let currentLang = 'ja';
let currentCat = 'starters';
let mascotDataUrl = null;
let uidCounter = 0;
const itemsByUid = {};

function buildIndex(){
  ['starters','fried','grilled','riceNoodle'].forEach(k=>{
    DATA[k].forEach(it=>{ it.uid = uidCounter++; itemsByUid[it.uid]=it; });
  });
  DATA.oden.items.forEach(it=>{ it.uid = uidCounter++; itemsByUid[it.uid]=it; });
  DATA.oden.set.uid = uidCounter++; itemsByUid[DATA.oden.set.uid]=DATA.oden.set;
  Object.keys(DATA.drinks).forEach(k=>{
    DATA.drinks[k].forEach(it=>{ it.uid = uidCounter++; itemsByUid[it.uid]=it; });
  });
}
buildIndex();

function fmt(n){ return n.toLocaleString('en-US') + '₫'; }

function photoSlotHtml(item){
  const img = item.photo ? `<img src="${item.photo}">` : '📷';
  return `<label class="photo-slot"><span class="photo-fallback">${item.photo?'':img}</span>${item.photo?img:''}<input type="file" accept="image/*" class="photo-input" data-uid="${item.uid}"></label>`;
}

function itemRow(item, lang){
  const name = item.names[lang] || item.names.en;
  const jp = lang!=='ja' ? `<p class="item-jp">${item.names.ja}</p>` : '';
  const numBadge = item.num ? `<span class="num-badge">${item.num}</span>` : '';
  let priceHtml;
  if(item.priceBottle){
    priceHtml = `<span class="price-row-label">${UI[lang].glass}</span> ${fmt(item.price)}<span class="price-bottle">${UI[lang].bottle} ${fmt(item.priceBottle)}</span>`;
  } else {
    priceHtml = fmt(item.price);
  }
  return `<div class="item">${photoSlotHtml(item)}<div class="item-main"><p class="item-name">${numBadge}${name}</p>${jp}</div><div class="item-price">${priceHtml}</div></div>`;
}

function renderSimpleList(items, lang){
  return items.map(it => itemRow(it, lang)).join('');
}

function mascotMiniHtml(){
  return mascotDataUrl ? `<img class="mascot-mini" src="${mascotDataUrl}">` : `<span class="mascot-mini-fallback">🐻</span>`;
}

function renderOden(lang){
  const u = UI[lang];
  const broth = `
    <div class="broth-card">
      <h3>${u.brothTitle}</h3>
      <p>${u.brothBody}</p>
      <span class="today-badge">${u.todaysBrothLabel}</span>
      <p class="today-name">${u.todaysBrothName}</p>
      <p style="margin-bottom:0;">${u.todaysBrothNote}</p>
    </div>`;
  const list = renderSimpleList(DATA.oden.items, lang);
  const setItem = DATA.oden.set;
  const setName = setItem.names[lang] || setItem.names.en;
  const setPhoto = setItem.photo ? `<img src="${setItem.photo}">` : '🍱';
  const setCard = `
    <div class="set-card">
      <label class="photo-slot">${setItem.photo?'':setPhoto}${setItem.photo?setPhoto:''}<input type="file" accept="image/*" class="photo-input" data-uid="${setItem.uid}"></label>
      <div style="flex:1;margin:0 10px;">
        <p class="set-label">${u.setLabel}</p>
        <p class="item-name" style="margin:0;">${setName}</p>
      </div>
      <div class="item-price">${fmt(setItem.price)}</div>
    </div>`;
  return broth + list + setCard;
}

function renderDrinks(lang){
  const u = UI[lang];
  const order = [['beer','sub_beer'],['whisky','sub_whisky'],['sour','sub_sour'],['teaCocktail','sub_teaCocktail'],['shochu','sub_shochu'],['sake','sub_sake'],['softDrink','sub_softDrink']];
  return order.map(([key,labelKey]) => {
    return `<p class="sub-title">${u[labelKey]}</p>` + renderSimpleList(DATA.drinks[key], lang);
  }).join('');
}

function renderCategoryBody(cat, lang){
  if(cat==='oden') return renderOden(lang);
  if(cat==='drinks') return renderDrinks(lang);
  return renderSimpleList(DATA[cat], lang);
}

function render(){
  const u = UI[currentLang];
  document.documentElement.lang = currentLang;
  document.body.className = 'lang-' + currentLang;
  document.getElementById('tagline').textContent = u.tagline;
  document.getElementById('footAddrLabel').textContent = u.address;
  document.getElementById('footHotlineLabel').textContent = u.hotline;
  document.getElementById('footNote').textContent = u.footerNote;

  const langRow = document.getElementById('langRow');
  langRow.innerHTML = LANGS.map(l => `<button class="lang-tab${l.code===currentLang?' active':''}" data-lang="${l.code}">${l.label}</button>`).join('');
  langRow.querySelectorAll('.lang-tab').forEach(btn => {
    btn.addEventListener('click', () => { currentLang = btn.dataset.lang; render(); });
  });

  const catRow = document.getElementById('catRow');
  catRow.innerHTML = CATS.map(c => `<button class="cat-tab${c===currentCat?' active':''}" data-cat="${c}">${u['cat_'+c]}</button>`).join('');
  catRow.querySelectorAll('.cat-tab').forEach(btn => {
    btn.addEventListener('click', () => { currentCat = btn.dataset.cat; render(); });
  });

  const main = document.getElementById('main');
  main.innerHTML = `<h2 class="section-title">${mascotMiniHtml()}${u['cat_'+currentCat]}</h2>` + renderCategoryBody(currentCat, currentLang);

  main.querySelectorAll('.photo-input').forEach(input=>{
    input.addEventListener('change', e=>{
      const file = e.target.files[0];
      if(!file) return;
      const uid = parseInt(e.target.dataset.uid,10);
      const reader = new FileReader();
      reader.onload = ()=>{
        itemsByUid[uid].photo = reader.result;
        render();
      };
      reader.readAsDataURL(file);
    });
  });
}

document.getElementById('mascotInput').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    mascotDataUrl = reader.result;
    document.getElementById('mascotFallback').outerHTML = `<img src="${mascotDataUrl}">`;
    render();
  };
  reader.readAsDataURL(file);
});

render();
</script>
</body>
</html>
